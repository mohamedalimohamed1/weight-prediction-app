<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <title>Weight Prediction</title>
</head>
<body>
    <div class="container">
        <h1>Weight Prediction Form</h1>
        <form id="predictionForm">
            <div class="form-group">
                <label for="participant_id">Participant ID:</label>
                <input type="text" id="participant_id" name="Participant ID" required>
            </div>

            <div class="form-group">
                <label for="age">Age:</label>
                <input type="number" id="age" name="Age" required>
            </div>

            <div class="form-group">
                <label for="gender">Gender:</label>
                <select id="gender" name="Gender" required>
                    <option value="M">Male</option>
                    <option value="F">Female</option>
                </select>
            </div>

            <div class="form-group">
                <label for="current_weight">Current Weight (lbs):</label>
                <input type="number" step="0.1" id="current_weight" name="Current Weight (lbs)" required>
            </div>

            <div class="form-group">
                <label for="bmr">BMR (Calories):</label>
                <input type="number" step="0.1" id="bmr" name="BMR (Calories)" required>
            </div>

            <div class="form-group">
                <label for="daily_calories">Daily Calories Consumed:</label>
                <input type="number" id="daily_calories" name="Daily Calories Consumed" required>
            </div>

            <div class="form-group">
                <label for="caloric_deficit">Daily Caloric Surplus/Deficit:</label>
                <input type="number" step="0.1" id="caloric_deficit" name="Daily Caloric Surplus/Deficit" required>
            </div>

            <div class="form-group">
                <label for="weight_change">Weight Change (lbs):</label>
                <input type="number" step="0.1" id="weight_change" name="Weight Change (lbs)" required>
            </div>

            <div class="form-group">
                <label for="duration">Duration (weeks):</label>
                <input type="number" id="duration" name="Duration (weeks)" required>
            </div>

            <div class="form-group">
                <label for="activity_level">Physical Activity Level:</label>
                <select id="activity_level" name="Physical Activity Level" required>
                    <option value="Sedentary">Sedentary</option>
                    <option value="Lightly Active">Lightly Active</option>
                    <option value="Moderately Active">Moderately Active</option>
                    <option value="Very Active">Very Active</option>
                </select>
            </div>

            <div class="form-group">
                <label for="sleep_quality">Sleep Quality:</label>
                <select id="sleep_quality" name="Sleep Quality" required>
                    <option value="Poor">Poor</option>
                    <option value="Fair">Fair</option>
                    <option value="Good">Good</option>
                    <option value="Excellent">Excellent</option>
                </select>
            </div>

            <div class="form-group">
                <label for="stress_level">Stress Level:</label>
                <input type="number" id="stress_level" name="Stress Level" required>
            </div>

            <button type="submit" id="predictBtn">Check Final Weight</button>
        </form>

        <div id="loading" class="loading-spinner" style="display: none;"></div>

        <div id="result" class="result-section"></div>

        <div class="converter">
            <h2>Weight Converter</h2>
            <div class="form-group">
                <label for="lbs_to_kg">LBS to KG:</label>
                <input type="number" id="lbs_input" placeholder="Enter LBS" oninput="convertLbsToKg()">
                <input type="number" id="kg_output" placeholder="KG" readonly>
            </div>
        
            <div class="form-group">
                <label for="kg_to_lbs">KG to LBS:</label>
                <input type="number" id="kg_input" placeholder="Enter KG" oninput="convertKgToLbs()">
                <input type="number" id="lbs_output" placeholder="LBS" readonly>
            </div>
        </div>
        
    </div>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
